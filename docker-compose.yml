services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KITE_MCP_URL=${KITE_MCP_URL:-https://mcp.kite.trade/mcp}
      - FRONTEND_URL=http://localhost:8000
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
